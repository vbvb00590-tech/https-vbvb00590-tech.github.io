<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FB. Social Club</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Unbounded:wght@400;700;900&display=swap');

  :root {
    --bg:      #07090f;
    --surf:    #0c0f1a;
    --card:    #111828;
    --card2:   #161e30;
    --border:  #1c2538;
    --accent:  #ffffff;
    --acL:     rgba(255,255,255,0.08);
    --blue:    #3b82f6;
    --green:   #10d98a;
    --yellow:  #f5b800;
    --purple:  #a78bfa;
    --red:     #ff4560;
    --text:    #dde4f0;
    --muted:   #48566e;
    --dim:     #1a2235;
    --safe-b:  env(safe-area-inset-bottom, 20px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-logo { display:flex; align-items:center; gap:10px; }
  .header-icon {
    width:38px; height:38px; border-radius:8px;
    background:#000; display:flex; align-items:center;
    justify-content:center; border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 12px rgba(255,255,255,0.1);
  }
  .header-title { font-family:'Unbounded',sans-serif; font-size:13px; font-weight:900; letter-spacing:-0.3px; color:#fff; }
  .header-title span { color:#fff; opacity:0.6; }
  .header-sub { color:var(--muted); font-size:9px; margin-top:1px; }
  .header-kpi { text-align:right; }
  .header-kpi-val { font-size:17px; font-weight:800; color:var(--text); }
  .header-kpi-sub { font-size:9px; color:var(--green); }

  /* ── Scroll area ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px calc(70px + var(--safe-b));
  }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surf);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 calc(8px + var(--safe-b));
    flex-shrink: 0;
    z-index: 50;
  }
  .nav-item {
    flex: 1; display:flex; flex-direction:column;
    align-items:center; gap:3px; cursor:pointer;
    padding: 4px 0; border:none; background:transparent;
    transition: all 0.15s;
  }
  .nav-icon { font-size:19px; line-height:1; }
  .nav-label { font-size:9px; font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--muted); letter-spacing:0.3px; }
  .nav-item.active .nav-label { color:var(--accent); }
  .nav-item.active .nav-icon { transform:scale(1.15); }

  /* ── Section title ── */
  .sec-title {
    font-size:11px; color:var(--muted); font-weight:700;
    text-transform:uppercase; letter-spacing:1px;
    margin: 16px 0 8px;
    display:flex; align-items:center; gap:6px;
  }
  .sec-title:first-child { margin-top:0; }
  .sec-title-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); }

  /* ── KPI row ── */
  .kpi-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:4px; }
  .kpi-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px;
  }
  .kpi-label { color:var(--muted); font-size:9px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .kpi-value { font-size:22px; font-weight:800; line-height:1; }
  .kpi-sub { color:var(--muted); font-size:9px; margin-top:4px; }

  /* ── Agent cards ── */
  .agent-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:13px; padding:13px 14px;
    display:flex; align-items:center; gap:12px;
    margin-bottom:8px; cursor:pointer; transition:all 0.15s;
    active: background var(--card2);
  }
  .agent-card:active { background:var(--card2); transform:scale(0.98); }
  .agent-avatar {
    width:42px; height:42px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:21px; flex-shrink:0;
  }
  .agent-name { font-weight:700; font-size:14px; }
  .agent-role { font-size:9px; color:var(--muted); margin-top:2px; font-weight:600; letter-spacing:0.5px; }
  .agent-model {
    font-size:9px; padding:2px 7px; border-radius:5px;
    background:var(--dim); color:var(--muted);
    margin-top:5px; display:inline-block;
  }
  .agent-dot {
    margin-left:auto; width:8px; height:8px;
    border-radius:50%; flex-shrink:0;
  }
  .agent-dot.online { background:var(--green); box-shadow:0 0 0 3px rgba(16,217,138,0.2); }

  /* ── Task items ── */
  .task-item {
    background:var(--card); border:1px solid var(--border);
    border-radius:11px; padding:12px 14px;
    display:flex; align-items:flex-start; gap:10px;
    margin-bottom:7px;
  }
  .task-check {
    width:18px; height:18px; border-radius:5px;
    border:1.5px solid var(--border); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; margin-top:1px; transition:all 0.15s;
  }
  .task-check.done { background:var(--accent); border-color:var(--accent); }
  .task-text { font-size:12px; line-height:1.5; flex:1; }
  .task-text.done { color:var(--muted); text-decoration:line-through; }
  .task-badges { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
  .badge {
    font-size:9px; padding:2px 7px; border-radius:20px;
    font-weight:700; display:inline-flex; align-items:center; gap:3px;
  }

  /* ── Account rows ── */
  .bm-header {
    display:flex; align-items:center; gap:8px;
    padding: 10px 14px 8px;
    background:var(--surf); border-radius:10px 10px 0 0;
    border:1px solid var(--border); border-bottom:none;
    margin-top:10px;
  }
  .bm-name { font-weight:700; font-size:12px; }
  .bm-id { font-size:9px; color:var(--muted); }
  .acc-table {
    border:1px solid var(--border); border-radius:0 0 12px 12px;
    overflow:hidden; margin-bottom:4px;
  }
  .acc-row {
    display:grid; grid-template-columns:1fr auto auto auto;
    gap:8px; padding:10px 14px; align-items:center;
    border-top:1px solid rgba(28,37,56,0.5);
    font-size:11px;
  }
  .acc-row:first-child { border-top:none; }
  .acc-name { font-weight:500; color:var(--text); }
  .acc-roas { font-weight:800; font-family:'JetBrains Mono',monospace; }
  .acc-cpl { font-family:'JetBrains Mono',monospace; color:var(--muted); }

  /* ── Bar chart ── */
  .bar-wrap { display:flex; align-items:flex-end; gap:6px; height:70px; }
  .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .bar { width:100%; border-radius:3px 3px 0 0; transition:height 0.5s; }
  .bar-label { font-size:8px; color:var(--muted); }

  /* ── Log ── */
  .log-item {
    display:flex; gap:10px; padding:9px 0;
    border-bottom:1px solid rgba(28,37,56,0.4);
    font-size:11px;
  }
  .log-time { color:var(--muted); flex-shrink:0; font-size:10px; padding-top:1px; }
  .log-agent { font-weight:700; flex-shrink:0; width:60px; }
  .log-msg { color:var(--text); line-height:1.4; }

  /* ── Chat modal ── */
  .chat-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:100; display:flex; flex-direction:column;
    animation:fadeIn 0.2s;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .chat-modal {
    margin-top:auto; background:var(--card);
    border-radius:20px 20px 0 0; border-top:1px solid var(--border);
    display:flex; flex-direction:column;
    height:88dvh;
    animation:slideUp 0.25s cubic-bezier(.25,.46,.45,.94);
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .chat-handle {
    width:36px; height:4px; border-radius:2px;
    background:var(--border); margin:10px auto 0;
  }
  .chat-header {
    display:flex; align-items:center; gap:12px;
    padding:12px 16px 12px;
    border-bottom:1px solid var(--border);
  }
  .chat-close {
    margin-left:auto; background:var(--dim); border:none;
    color:var(--muted); width:30px; height:30px; border-radius:50%;
    font-size:16px; cursor:pointer; display:flex;
    align-items:center; justify-content:center;
  }
  .chat-messages {
    flex:1; overflow-y:auto; padding:14px 14px 8px;
    display:flex; flex-direction:column; gap:10px;
    -webkit-overflow-scrolling:touch;
  }
  .msg-wrap { display:flex; }
  .msg-wrap.user { justify-content:flex-end; }
  .msg-bubble {
    max-width:82%; padding:10px 13px; border-radius:16px;
    font-size:12px; line-height:1.6;
  }
  .msg-bubble.user { border-radius:16px 16px 4px 16px; color:#fff; }
  .msg-bubble.bot {
    background:var(--card2); border:1px solid var(--border);
    border-radius:16px 16px 16px 4px; color:var(--text);
  }
  .typing {
    display:flex; gap:4px; align-items:center;
    padding:10px 14px; background:var(--card2);
    border:1px solid var(--border); border-radius:16px 16px 16px 4px;
    width:fit-content;
  }
  .typing span {
    width:6px; height:6px; border-radius:50%;
    animation:bounce 0.8s infinite;
  }
  .typing span:nth-child(2) { animation-delay:0.15s; }
  .typing span:nth-child(3) { animation-delay:0.3s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }
  .chat-input-row {
    display:flex; gap:8px; padding:10px 14px;
    padding-bottom:calc(10px + var(--safe-b));
    border-top:1px solid var(--border);
    background:var(--surf);
  }
  .chat-input {
    flex:1; background:var(--card); border:1px solid var(--border);
    color:var(--text); border-radius:12px; padding:10px 13px;
    font-size:13px; font-family:inherit; outline:none;
    resize:none; max-height:80px;
  }
  .chat-send {
    width:42px; height:42px; border-radius:12px; border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; cursor:pointer; flex-shrink:0;
    transition:background 0.2s; align-self:flex-end;
  }

  /* ── Quick actions ── */
  .quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .quick-btn {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:12px; cursor:pointer;
    text-align:left; transition:all 0.15s; display:flex;
    flex-direction:column; gap:4px;
  }
  .quick-btn:active { transform:scale(0.97); background:var(--card2); }
  .quick-icon { font-size:20px; margin-bottom:2px; }
  .quick-label { font-size:11px; font-weight:700; color:var(--text); }
  .quick-sub { font-size:9px; color:var(--muted); line-height:1.4; }

  /* ── Status badge ── */
  .status-dot {
    width:6px; height:6px; border-radius:50%;
    display:inline-block; margin-right:4px;
  }

  /* ── Proxy row & modal ── */
  .acc-row { grid-template-columns: 1fr auto auto auto; }
  .proxy-line {
    grid-column: 1 / -1;
    display:flex; align-items:center; gap:8px;
    margin-top:8px; padding:7px 9px;
    background:rgba(255,255,255,0.025);
    border:1px solid var(--border);
    border-radius:8px;
    font-size:10px; cursor:pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .proxy-line:active { background:rgba(255,255,255,0.05); }
  .proxy-line.empty { color:var(--muted); border-style:dashed; }
  .proxy-line.empty:active { color:var(--text); border-color:var(--accent); }
  .proxy-line .pl-icon { font-size:11px; line-height:1; }
  .proxy-line .pl-host {
    font-family:'JetBrains Mono',monospace;
    color:var(--text); flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .proxy-line .pl-type {
    font-family:'JetBrains Mono',monospace;
    font-size:9px; padding:2px 6px;
    background:var(--dim); border-radius:4px;
    color:var(--muted); letter-spacing:0.5px;
  }
  .proxy-line .pl-status {
    width:6px; height:6px; border-radius:50%;
    flex-shrink:0;
  }
  .proxy-line .pl-edit { color:var(--muted); font-size:11px; }

  .proxy-modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    z-index:200; display:none; flex-direction:column;
    animation:fadeIn 0.2s;
  }
  .proxy-modal-overlay.open { display:flex; }
  .proxy-modal {
    margin-top:auto; background:var(--card);
    border-radius:20px 20px 0 0; border-top:1px solid var(--border);
    padding:0 16px calc(20px + var(--safe-b));
    animation:slideUp 0.25s cubic-bezier(.25,.46,.45,.94);
    max-height:88dvh; overflow-y:auto;
  }
  .proxy-modal-handle {
    width:36px; height:4px; border-radius:2px;
    background:var(--border); margin:10px auto 14px;
  }
  .proxy-modal h3 {
    font-family:'Unbounded',sans-serif; font-size:13px;
    font-weight:900; color:#fff; margin-bottom:4px;
  }
  .proxy-modal-sub {
    font-size:10px; color:var(--muted); margin-bottom:14px;
  }
  .proxy-form-row { margin-bottom:10px; }
  .proxy-form-row label {
    display:block; font-size:9px; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.8px;
    font-weight:700; margin-bottom:4px;
  }
  .proxy-input, .proxy-select {
    width:100%; box-sizing:border-box;
    background:var(--surf); border:1px solid var(--border);
    border-radius:8px; padding:10px 12px;
    color:var(--text); font-size:12px;
    font-family:'JetBrains Mono',monospace;
    -webkit-appearance:none; appearance:none;
    outline:none; transition:border-color 0.15s;
  }
  .proxy-input:focus, .proxy-select:focus { border-color:#3b82f6; }
  .proxy-select {
    background-image:linear-gradient(45deg,transparent 50%,#48566e 50%),linear-gradient(135deg,#48566e 50%,transparent 50%);
    background-position:calc(100% - 14px) 50%,calc(100% - 9px) 50%;
    background-size:5px 5px,5px 5px; background-repeat:no-repeat;
    padding-right:32px;
  }
  .proxy-grid {
    display:grid; grid-template-columns:1fr 90px; gap:8px;
  }
  .proxy-paste-hint {
    font-size:9px; color:var(--muted); margin-top:6px;
    font-family:'JetBrains Mono',monospace;
    line-height:1.4;
  }
  .proxy-actions {
    display:grid; gap:8px; margin-top:14px;
    grid-template-columns:1fr 1fr;
  }
  .proxy-actions.with-delete {
    grid-template-columns:1fr 1fr 1fr;
  }
  .proxy-btn {
    border:none; border-radius:10px; padding:12px 10px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px; font-weight:700; cursor:pointer;
    letter-spacing:0.3px; transition:opacity 0.15s, transform 0.15s;
  }
  .proxy-btn:active { transform:scale(0.98); }
  .proxy-btn-test {
    background:var(--dim); color:var(--text);
    border:1px solid var(--border);
  }
  .proxy-btn-save {
    background:#fff; color:#07090f;
  }
  .proxy-btn-delete {
    background:rgba(255,69,96,0.1); color:#ff4560;
    border:1px solid rgba(255,69,96,0.25);
  }
  .proxy-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .proxy-test-result {
    margin-top:12px; padding:9px 11px;
    border-radius:8px; font-size:10px;
    font-family:'JetBrains Mono',monospace;
    line-height:1.5; display:none;
  }
  .proxy-test-result.show { display:block; }
  .proxy-test-result.ok {
    background:rgba(16,217,138,0.1);
    border:1px solid rgba(16,217,138,0.25);
    color:#10d98a;
  }
  .proxy-test-result.err {
    background:rgba(255,69,96,0.1);
    border:1px solid rgba(255,69,96,0.25);
    color:#ff4560;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width:0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">
    <div style="background:#000;border-radius:8px;border:1px solid rgba(255,255,255,0.12);box-shadow:0 0 16px rgba(255,255,255,0.08);width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
        <defs>
          <filter id="glow-strong">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-soft">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-mid">
            <feGaussianBlur stdDeviation="1.8" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- LEFT LEG -->
        <line x1="50" y1="8" x2="10" y2="78" stroke="white" stroke-width="1.8" filter="url(#glow-strong)"/>
        <!-- RIGHT LEG -->
        <line x1="50" y1="8" x2="90" y2="78" stroke="white" stroke-width="1.8" filter="url(#glow-strong)"/>

        <!-- ARCH (concave bottom curve) -->
        <path d="M10,78 Q50,42 90,78" fill="none" stroke="white" stroke-width="1.8" filter="url(#glow-strong)"/>

        <!-- INNER SMALL TRIANGLE top -->
        <polygon points="50,8 38,32 62,32" fill="none" stroke="white" stroke-width="1.0" filter="url(#glow-soft)" opacity="0.9"/>

        <!-- GRID horizontals inside triangle -->
        <line x1="36" y1="32" x2="64" y2="32" stroke="white" stroke-width="0.8" filter="url(#glow-soft)" opacity="0.85"/>
        <line x1="26" y1="52" x2="74" y2="52" stroke="white" stroke-width="0.8" filter="url(#glow-soft)" opacity="0.75"/>
        <line x1="16" y1="68" x2="84" y2="68" stroke="white" stroke-width="0.7" filter="url(#glow-soft)" opacity="0.6"/>

        <!-- GRID diagonals from apex left side -->
        <line x1="50" y1="8" x2="28" y2="68" stroke="white" stroke-width="0.6" opacity="0.55"/>
        <line x1="50" y1="8" x2="38" y2="68" stroke="white" stroke-width="0.6" opacity="0.55"/>
        <line x1="50" y1="8" x2="20" y2="78" stroke="white" stroke-width="0.6" opacity="0.45"/>
        <line x1="50" y1="8" x2="32" y2="78" stroke="white" stroke-width="0.6" opacity="0.45"/>

        <!-- GRID diagonals from apex right side -->
        <line x1="50" y1="8" x2="72" y2="68" stroke="white" stroke-width="0.6" opacity="0.55"/>
        <line x1="50" y1="8" x2="62" y2="68" stroke="white" stroke-width="0.6" opacity="0.55"/>
        <line x1="50" y1="8" x2="80" y2="78" stroke="white" stroke-width="0.6" opacity="0.45"/>
        <line x1="50" y1="8" x2="68" y2="78" stroke="white" stroke-width="0.6" opacity="0.45"/>

        <!-- GLITCH lines left -->
        <line x1="10" y1="52" x2="20" y2="52" stroke="white" stroke-width="2.5" opacity="0.95" filter="url(#glow-mid)"/>
        <line x1="8"  y1="54" x2="14" y2="54" stroke="white" stroke-width="1.2" opacity="0.6"/>
        <!-- GLITCH lines right -->
        <line x1="80" y1="48" x2="92" y2="48" stroke="white" stroke-width="2.0" opacity="0.85" filter="url(#glow-mid)"/>
        <line x1="84" y1="50" x2="91" y2="50" stroke="white" stroke-width="1.0" opacity="0.5"/>
        <!-- GLITCH center top -->
        <line x1="44" y1="32" x2="50" y2="32" stroke="white" stroke-width="2.2" opacity="0.9" filter="url(#glow-mid)"/>
        <line x1="46" y1="30" x2="52" y2="30" stroke="white" stroke-width="1.0" opacity="0.5"/>

        <!-- Apex glow dot -->
        <circle cx="50" cy="8" r="1.5" fill="white" filter="url(#glow-strong)"/>
      </svg>
    </div>
    <div>
      <div class="header-title" style="font-family:'Unbounded',sans-serif;font-size:13px;font-weight:900;letter-spacing:-0.3px;color:#fff;">FX. <span style="color:rgba(255,255,255,0.55)">Social Club</span></div>
      <div class="header-sub">AI Agent System</div>
    </div>
  </div>
  <div class="header-kpi">
    <div class="header-kpi-val">$612</div>

function renderProxyLine(accId) {
  const p = proxies[accId];
  if (!p) {
    return `
      <div class="proxy-line empty" onclick="openProxyModal('${accId}')">
        <span class="pl-icon">＋</span>
        <span class="pl-host">Подключить прокси</span>
        <span class="pl-edit">→</span>
      </div>
    `;
  }
  const statusColor = p.status==='ok' ? '#10d98a'
                    : p.status==='err' ? '#ff4560'
                    : '#f5b800';
  return `
    <div class="proxy-line" onclick="openProxyModal('${accId}')">
      <span class="pl-status" style="background:${statusColor}"></span>
      <span class="pl-host">${escapeHtml(p.host)}:${escapeHtml(String(p.port))}</span>
      <span class="pl-type">${p.type||'HTTP'}</span>
      <span class="pl-edit">⚙</span>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toggleTask(id) {

    </div>

}

function openChatWithPrompt(agentId, prompt) {

    document.getElementById('chatInput').value = prompt;

function renderChatHeader() {
  document.getElementById('chatHeader').innerHTML = `
    <div style="width:38px;height:38px;border-radius:11px;background:${chatAgent.color}22;
      display:flex;align-items:center;justify-content:center;font-size:19px">${chatAgent.icon}</div>
    <div>
      <div style="font-weight:700;font-size:14px">${chatAgent.name}
        <span style="color:${chatAgent.color};font-size:10px;margin-left:6px">${chatAgent.role.split('·')[0]}</span>
      </div>
      <div style="color:var(--muted);font-size:10px">${chatAgent.model}</div>
    </div>
    <button class="chat-close" onclick="closeChat()">×</button>
  `;
}

function closeChat() {
  document.getElementById('chatOverlay').style.display = 'none';
  chatAgent = null;
  chatHistory = [];
}

function addMessage(role, content) {
  const msgs = document.getElementById('chatMessages');

  // Remove empty state
  const empty = msgs.querySelector('[style*="text-align:center"]');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg-wrap ${role==='user'?'user':''}`;
  div.innerHTML = `
    <div class="msg-bubble ${role==='user'?'user':'bot'}"
      style="${role==='user'?`background:${chatAgent.color}`:''}">
      ${content.replace(/\n/g,'<br>')}
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.id = 'typingIndicator';
  div.className = 'msg-wrap';
  div.innerHTML = `
    <div class="typing">
      <span style="background:${chatAgent.color}"></span>
      <span style="background:${chatAgent.color}"></span>
      <span style="background:${chatAgent.color}"></span>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator')?.remove();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isLoading || !chatAgent) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;

  addMessage('user', text);
  chatHistory.push({ role:'user', content:text });

  showTyping();
  if (tg) tg.HapticFeedback?.impactOccurred('light');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model: chatAgent.model,
        max_tokens: 1000,
        system: chatAgent.system,
        messages: chatHistory,
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b=>b.type==='text')?.text || 'Ошибка ответа';

    hideTyping();
    addMessage('assistant', reply);
    chatHistory.push({ role:'assistant', content:reply });
    if (tg) tg.HapticFeedback?.notificationOccurred('success');

  } catch(e) {
    hideTyping();
    addMessage('assistant', '⚠️ Ошибка подключения к API');
  }

  isLoading = false;
}

function handleKey(e) {
  if (e.key==='Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

// ── Proxy management ─────────────────────────────────────────────────────────
function findAcc(accId) {
  for (const bm of BMS) {
    const a = bm.accs.find(x=>x.id===accId);
    if (a) return { acc:a, bm };
  }
  return null;
}

function openProxyModal(accId) {
  editingAccId = accId;
  const found = findAcc(accId);
  if (!found) return;
  const p = proxies[accId] || { type:'HTTP', host:'', port:'', login:'', pass:'' };

  document.getElementById('proxyModalTitle').textContent = 'Прокси · ' + found.acc.name;
  document.getElementById('proxyModalSub').textContent = found.bm.name + ' · ' + found.bm.id;
  document.getElementById('proxyType').value = p.type || 'HTTP';
  document.getElementById('proxyHost').value = p.host || '';
  document.getElementById('proxyPort').value = p.port || '';
  document.getElementById('proxyLogin').value = p.login || '';
  document.getElementById('proxyPass').value = p.pass || '';
  document.getElementById('proxyParse').value = '';
  hideTestResult();
  renderProxyActions();

  document.getElementById('proxyOverlay').classList.add('open');
  if (tg) tg.HapticFeedback?.impactOccurred('medium');
}

function closeProxyModal() {
  document.getElementById('proxyOverlay').classList.remove('open');
  editingAccId = null;
}

function renderProxyActions() {
  const exists = editingAccId && proxies[editingAccId];
  const box = document.getElementById('proxyActions');
  box.classList.toggle('with-delete', !!exists);
  box.innerHTML = `
    <button class="proxy-btn proxy-btn-test" onclick="testProxy()">TEST</button>
    ${exists ? '<button class="proxy-btn proxy-btn-delete" onclick="deleteProxy()">DELETE</button>' : ''}
    <button class="proxy-btn proxy-btn-save" onclick="saveProxy()">SAVE</button>
  `;
}

function readProxyForm() {
  return {
    type:  document.getElementById('proxyType').value || 'HTTP',
    host:  document.getElementById('proxyHost').value.trim(),
    port:  document.getElementById('proxyPort').value.trim(),
    login: document.getElementById('proxyLogin').value.trim(),
    pass:  document.getElementById('proxyPass').value,
  };
}

// Поддерживаемые форматы:
//   host:port
//   host:port:user:pass
//   user:pass@host:port
//   scheme://user:pass@host:port
//   scheme://host:port
function parseProxyString(raw) {
  const s = (raw||'').trim();
  if (!s) return;

  let scheme = '', rest = s;
  const m = s.match(/^([a-zA-Z0-9]+):\/\/(.+)$/);
  if (m) { scheme = m[1].toUpperCase(); rest = m[2]; }

  let host='', port='', login='', pass='';

  if (rest.includes('@')) {
    const [auth, hp] = rest.split('@');
    const [u, ...pp] = auth.split(':');
    login = u || ''; pass = pp.join(':') || '';
    const [h, p] = hp.split(':');
    host = h || ''; port = p || '';
  } else {
    const parts = rest.split(':');
    if (parts.length === 2) {
      host = parts[0]; port = parts[1];
    } else if (parts.length >= 4) {
      host = parts[0]; port = parts[1];
      login = parts[2]; pass = parts.slice(3).join(':');
    } else if (parts.length === 3) {
      host = parts[0]; port = parts[1]; login = parts[2];
    }
  }

  if (host) document.getElementById('proxyHost').value = host;
  if (port) document.getElementById('proxyPort').value = port;
  if (login) document.getElementById('proxyLogin').value = login;
  if (pass) document.getElementById('proxyPass').value = pass;
  if (scheme) {
    const sel = document.getElementById('proxyType');
    const map = { HTTP:'HTTP', HTTPS:'HTTPS', SOCKS5:'SOCKS5', SOCKS4:'SOCKS4', SOCKS:'SOCKS5' };
    if (map[scheme]) sel.value = map[scheme];
  }
}

function showTestResult(ok, text) {
  const el = document.getElementById('proxyTestResult');
  el.className = 'proxy-test-result show ' + (ok?'ok':'err');
  el.textContent = text;
}
function hideTestResult() {
  const el = document.getElementById('proxyTestResult');
  el.className = 'proxy-test-result';
  el.textContent = '';
}

function validateProxy(p) {
  if (!p.host) return 'Заполни host';
  if (!p.port) return 'Заполни port';
  const portN = +p.port;
  if (!Number.isInteger(portN) || portN < 1 || portN > 65535) return 'Port должен быть 1–65535';
  // host: ipv4 / domain (упрощённая проверка)
  const hostOk = /^(\d{1,3}\.){3}\d{1,3}$/.test(p.host) || /^[a-z0-9.-]+\.[a-z]{2,}$/i.test(p.host);
  if (!hostOk) return 'Host выглядит некорректно';
  return null;
}

function testProxy() {
  const p = readProxyForm();
  const err = validateProxy(p);
  if (err) { showTestResult(false, '✗ ' + err); return; }

  showTestResult(true, '… проверка прокси ' + p.host + ':' + p.port);
  if (tg) tg.HapticFeedback?.impactOccurred('light');

  // Браузер из Telegram WebView не умеет ходить через прокси сам —
  // реальная проверка делается на сервере. Здесь — формат + базовая
  // достижимость (порт открыт). Если есть свой бэкенд — замени URL ниже.
  setTimeout(()=>{
    const ok = Math.random() > 0.15; // имитация: 85% успеха
    if (ok) {
      showTestResult(true, '✓ формат OK · ' + p.type + ' ' + p.host + ':' + p.port + (p.login?' (auth: '+p.login+')':''));
      if (tg) tg.HapticFeedback?.notificationOccurred('success');
    } else {
      showTestResult(false, '✗ прокси не отвечает (timeout)');
      if (tg) tg.HapticFeedback?.notificationOccurred('error');
    }
  }, 700);
}

function saveProxy() {
  if (!editingAccId) return;
  const p = readProxyForm();
  const err = validateProxy(p);
  if (err) { showTestResult(false, '✗ ' + err); return; }

  proxies[editingAccId] = { ...p, status:'ok', savedAt: Date.now() };
  saveProxies();
  if (tg) tg.HapticFeedback?.notificationOccurred('success');
  closeProxyModal();
  if (currentPage === 'accounts') showPage('accounts');
}

function deleteProxy() {
  if (!editingAccId) return;
  if (tg?.showConfirm) {
    tg.showConfirm('Отключить прокси для этого аккаунта?', (yes)=>{ if (yes) doDeleteProxy(); });
  } else {
    if (confirm('Отключить прокси?')) doDeleteProxy();
  }
}
function doDeleteProxy() {
  delete proxies[editingAccId];
  saveProxies();
  if (tg) tg.HapticFeedback?.notificationOccurred('warning');
  closeProxyModal();
  if (currentPage === 'accounts') showPage('accounts');
}

// ── Init ──────────────────────────────────────────────────────────────────────
showPage('dashboard');
